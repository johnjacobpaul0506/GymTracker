<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Progress Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-light: #2c2c2c;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --error-color: #cf6679;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: #333333;
            --success-color: #4caf50;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; background-color: var(--bg-color); color: var(--text-primary); padding-bottom: 85px; }
        .container { padding: 1rem; max-width: 600px; margin: 0 auto; }
        .card { background-color: var(--surface-color); border-radius: var(--border-radius); padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border-color); }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.25rem; border-radius: var(--border-radius); border: none; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background-color: var(--primary-color); color: #000; }
        .btn-secondary { background-color: var(--surface-light); color: var(--text-primary); }
        .btn-icon { padding: 0.5rem; background: var(--surface-light); border: none; border-radius: 8px; cursor: pointer; color: var(--text-primary); }
        .view { display: none; }
        .view.active { display: block; }
        .calendar-day { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 0.5rem; border-radius: 8px; }
        .calendar-day.active { background: var(--surface-light); }
        .calendar-day .dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; margin-top: 4px; }
        .calendar-day .dot.active { background: var(--success-color); }
        .set-row { display: grid; grid-template-columns: 40px 1fr 1fr 40px; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success-color); color: white; padding: 0.5rem 1rem; border-radius: 20px; z-index: 1000; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <header class="container" style="padding: 1rem 1rem 0;">
        <h1 id="header-title">Gym Progress</h1>
    </header>

    <main class="container" id="app">
        <!-- Dashboard -->
        <section id="view-dashboard" class="view active">
            <div class="card">
                <div class="flex justify-between align-center mb-1">
                    <button class="btn-icon" onclick="changeWeek(-1)">◀</button>
                    <h3 id="current-week-label">This Week</h3>
                    <button class="btn-icon" onclick="changeWeek(1)">▶</button>
                </div>
                <div class="flex justify-between" id="dashboard-calendar"></div>
            </div>
            <div class="card text-center" id="dashboard-attendance"></div>
            <button class="btn btn-primary" onclick="navTo('workout')">Start Workout</button>
        </section>

        <!-- Workout -->
        <section id="view-workout" class="view">
            <div id="workout-selection">
                <div class="card">
                    <h2>Select Workout</h2>
                    <select id="select-module" class="mb-1" style="width:100%; padding: 0.5rem;"></select>
                    <select id="select-day" style="width:100%; padding: 0.5rem;"></select>
                    <button class="btn btn-primary mt-1" onclick="startWorkout()">Load</button>
                </div>
            </div>
            <div id="active-workout" style="display: none;">
                <div class="flex justify-between align-center mb-1">
                    <h2 id="active-workout-title">Workout</h2>
                    <button class="btn-icon" onclick="cancelWorkout()">✖</button>
                </div>
                <div id="workout-exercise-list"></div>
                <button class="btn btn-primary" onclick="saveWorkout()">Finish & Save All</button>
            </div>
        </section>

        <!-- History -->
        <section id="view-history" class="view">
            <h2>History</h2>
            <div id="history-list"></div>
        </section>

        <!-- Settings -->
        <section id="view-settings" class="view">
            <h2>Settings</h2>
            <div id="settings-modules-list"></div>
        </section>
    </main>

    <nav style="position:fixed; bottom:0; width:100%; background:var(--surface-color); display:flex; justify-content:space-around; padding: 1rem; border-top: 1px solid var(--border-color);">
        <div onclick="navTo('dashboard')">🏠</div>
        <div onclick="navTo('workout')">🏋️</div>
        <div onclick="navTo('history')">🕒</div>
        <div onclick="navTo('settings')">⚙️</div>
    </nav>

    <div id="toast" class="toast">Saved!</div>

    <script>
        let appData = JSON.parse(localStorage.getItem('gym_tracker')) || { modules: [], history: [], exercises: [] };
        let selectedDateFilter = null;

        function saveData() { localStorage.setItem('gym_tracker', JSON.stringify(appData)); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
        function navTo(v) { 
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'dashboard') renderDashboard();
            if(v === 'history') renderHistory();
            if(v === 'workout') renderWorkoutSetup();
        }

        function getProgressStatus(weeklyVisits) {
            const d = new Date();
            const dayOfWeek = d.getDay() === 0 ? 6 : d.getDay() - 1; // 0=Mon, 4=Fri
            
            // Expected pace: 3 workouts by Friday
            const expected = Math.max(1, Math.ceil((dayOfWeek + 1) / 5 * 3));
            
            if (weeklyVisits >= expected) return { emoji: '😄', msg: "On track! Great work." };
            return { emoji: '😟', msg: `Pace up! Aim for ${expected} visits by week end.` };
        }

        window.saveSingleExercise = function(exId) {
            const card = document.querySelector(`[data-ex-id="${exId}"]`);
            const rows = card.querySelectorAll('.set-row');
            const setsList = [];
            rows.forEach(r => {
                const w = r.querySelector('.set-weight').value;
                const rps = r.querySelector('.set-reps').value;
                if(w || rps) setsList.push({weight: w, reps: rps});
            });
            
            // Update temporary workout state
            const ex = activeWorkoutData.exercises.find(e => e.id === exId);
            if(ex) ex.setsList = setsList;
            else activeWorkoutData.exercises.push({id: exId, name: card.dataset.exName, setsList});
            
            showToast("Exercise saved locally!");
        };

        let currentWeekOffset = 0;
        function renderDashboard() {
            const start = new Date(); start.setDate(start.getDate() - start.getDay() + 1 + (currentWeekOffset*7));
            const end = new Date(start); end.setDate(end.getDate() + 6);
            
            const workouts = appData.history.filter(h => h.date >= start.getTime() && h.date <= end.getTime() + 86400000);
            const visits = new Set(workouts.map(w => new Date(w.date).toDateString())).size;
            const status = getProgressStatus(visits);

            document.getElementById('dashboard-attendance').innerHTML = `
                <div style="font-size: 3rem;">${status.emoji}</div>
                <h2>${visits} visits this week</h2>
                <p>${status.msg}</p>
            `;
            
            // Render Calendar
            let calHtml = '';
            for(let i=0; i<7; i++) {
                let d = new Date(start); d.setDate(d.getDate() + i);
                let has = workouts.some(w => new Date(w.date).toDateString() === d.toDateString());
                calHtml += `
                    <div class="calendar-day" onclick="filterByDate('${d.toDateString()}')">
                        <span>${['M','T','W','T','F','S','S'][i]}</span>
                        <div class="dot ${has ? 'active' : ''}"></div>
                    </div>
                `;
            }
            document.getElementById('dashboard-calendar').innerHTML = calHtml;
        }

        function filterByDate(dateStr) {
            selectedDateFilter = dateStr;
            navTo('history');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            let filtered = appData.history.sort((a,b) => b.date - a.date);
            if(selectedDateFilter) {
                filtered = filtered.filter(h => new Date(h.date).toDateString() === selectedDateFilter);
            }
            
            list.innerHTML = filtered.map(h => `
                <div class="card">
                    <h3>${h.moduleName} - ${h.dayName}</h3>
                    <small>${new Date(h.date).toLocaleDateString()}</small>
                    ${h.exercises.map(ex => `<div class="mt-1">${ex.name}: ${ex.setsList.map(s => s.weight+'kg x '+s.reps).join(', ')}</div>`).join('')}
                </div>
            `).join('');
            selectedDateFilter = null; // reset filter
        }

        function startWorkout() {
            // ... (Existing logic, ensure exercise card has [data-ex-id] and [data-ex-name])
            // Just add this inside the exercise card render loop:
            // `<button class="btn btn-secondary mt-1" onclick="saveSingleExercise('${ex.id}')">Save Exercise</button>`
            // (Implemented in full code block below)
        }
        
        window.onload = () => navTo('dashboard');

    </script>
</body>
</html>
